name: Multi Registry Build Push and Azure Deploy

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: app-task4-jihyun2144
  DOCKERHUB_IMAGE: jihyun2144/task4
  ACR_LOGIN_SERVER: acrtask4jihyun2144.azurecr.io
  IMAGE_NAME: flask-multi-registry-app

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image with Docker Hub and ACR tags
        run: |
          docker build \
            -t ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }} \
            -t ${{ env.DOCKERHUB_IMAGE }}:latest \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKERHUB_IMAGE }}:latest

      - name: Push Docker image to Azure ACR
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy ACR image to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
